name: CI

on:
  push:
  pull_request:

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - name: get repo
        uses: actions/checkout@v3

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: set up uv
        uses: astral-sh/setup-uv@v5

      - name: install dependencies
        run: |
          uv pip install --system flake8 "black[jupyter]" isort

      - name: lint with flake8
        run: |
          flake8

      - name: lint with black
        run: |
          black --check .

      - name: lint with isort
        run: |
          isort --check .

  train-models:

      runs-on: ubuntu-latest

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.12"

        - run: HEAVYEDGE_TEST_MODE=1 ./setup.sh
          env:
            HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
            LABELS_V1_GDRIVE: ${{ secrets.LABELS_V1_GDRIVE }}

        - name: build model
          run: HEAVYEDGE_TEST_MODE=1 make model models

        - name: test model
          run: HEAVYEDGE_TEST_MODE=1 make test

        - uses: actions/upload-artifact@v4
          with:
            name: train-profiles
            path: _data/v1/profiles/dataset5/*
            retention-days: 1

        - uses: actions/upload-artifact@v4
          with:
            name: train-labels
            path: _data/v1/labels/dataset5/*
            retention-days: 1

        - uses: actions/upload-artifact@v4
          with:
            name: test-dataset
            path: _data/v1/profiles/dataset5/001-Mean.h5
            retention-days: 1

        - uses: actions/upload-artifact@v4
          with:
            name: trained-models
            path: |
              model/*
              models/*
            retention-days: 1

  test-model:

      needs: train-model

      runs-on: ubuntu-latest

      steps:

        - name: get repo
          uses: actions/checkout@v3

        - name: set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.12"

        - name: set up uv
          uses: astral-sh/setup-uv@v5

        - run: uv pip install --system -r requirements.txt

        - uses: actions/download-artifact@v4
          with:
            name: test-dataset
            path: _data/v1/profiles/dataset5

        - uses: actions/download-artifact@v4
          with:
            name: trained-models
            path: .

        - name: test model
          run: HEAVYEDGE_TEST_MODE=1 make test
