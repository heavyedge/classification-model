name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [published]

permissions:
  checks: write
  packages: write

jobs:

  build-image:

    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.image-metadata.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set Docker image metadata
        id: image-metadata
        shell: bash
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "tag=${GIT_SHA::7}-${RUN_ID}-${RUN_ATTEMPT}-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push temporary Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: dev
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=classification-model-dev
          cache-to: type=gha,mode=max,scope=classification-model-dev
          tags: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ steps.image-metadata.outputs.tag }}

  resolve-variables:

    runs-on: ubuntu-latest

    outputs:
      model_mode: ${{ steps.configuration.outputs.model_mode }}
      model_revision: ${{ steps.configuration.outputs.model_revision }}
      model_repo_id: ${{ steps.configuration.outputs.model_repo_id }}
      email_recipient: ${{ steps.email.outputs.email }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve CD configuration
        id: configuration
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          python3 .github/scripts/parse-version.py \
            --event-name "$EVENT_NAME" \
            --ref-name "$REF_NAME"

      - name: Resolve email recipient
        id: email
        uses: actions/github-script@v9
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          NOTIFY_EMAIL_MAP: ${{ vars.SMTP_NOTIFY_EMAIL_MAP }}
        with:
          script: |
            const noreplyPattern = /(^|@)(users\.)?noreply\.github\.com$/i;
            const usableEmail = (email) => email && !noreplyPattern.test(email);

            let emailMap = {};
            if (process.env.NOTIFY_EMAIL_MAP) {
              try {
                emailMap = JSON.parse(process.env.NOTIFY_EMAIL_MAP);
              } catch (error) {
                core.warning(`Ignoring invalid SMTP_NOTIFY_EMAIL_MAP JSON: ${error.message}`);
              }
            }

            const { data: commit } = await github.rest.repos.getCommit({
              ...context.repo,
              ref: process.env.GIT_SHA,
            });

            const candidates = [
              context.payload.pull_request?.user?.login,
              context.payload.release?.author?.login,
              commit.author?.login,
              commit.committer?.login,
              context.actor,
            ].filter(Boolean);
            const login = [...new Set(candidates)][0];

            if (login && emailMap[login]) {
              core.setOutput('email', emailMap[login]);
              return;
            }

            if (login) {
              const { data: user } = await github.rest.users.getByUsername({ username: login });
              if (usableEmail(user.email)) {
                core.setOutput('email', user.email);
                return;
              }
            }

            const commitEmails = [
              commit.commit.author?.email,
              commit.commit.committer?.email,
            ];
            const commitEmail = commitEmails.find(usableEmail);
            if (commitEmail) {
              core.setOutput('email', commitEmail);
              return;
            }

            core.warning(
              `Could not resolve a public notification email for ${login || 'the commit author'}; deployment email notification will be skipped.`
            );
            core.setOutput('email', '');
