name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [published]

permissions:
  checks: write
  packages: write

jobs:

  build-image:

    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.image-metadata.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set Docker image metadata
        id: image-metadata
        shell: bash
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "tag=${GIT_SHA::7}-${RUN_ID}-${RUN_ATTEMPT}-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push temporary Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: dev
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=classification-model-dev
          cache-to: type=gha,mode=max,scope=classification-model-dev
          tags: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ steps.image-metadata.outputs.tag }}

  resolve-variables:

    runs-on: ubuntu-latest

    outputs:
      model_mode: ${{ steps.configuration.outputs.model_mode }}
      model_revision: ${{ steps.configuration.outputs.model_revision }}
      model_repo_id: ${{ steps.configuration.outputs.model_repo_id }}
      email_recipient: ${{ steps.email.outputs.email }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve CD configuration
        id: configuration
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          python3 .github/scripts/parse-version.py \
            --event-name "$EVENT_NAME" \
            --ref-name "$REF_NAME"

      - name: Resolve email recipient
        id: email
        uses: actions/github-script@v9
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          NOTIFY_EMAIL_MAP: ${{ vars.SMTP_NOTIFY_EMAIL_MAP }}
        with:
          script: |
            const noreplyPattern = /(^|@)(users\.)?noreply\.github\.com$/i;
            const usableEmail = (email) => email && !noreplyPattern.test(email);

            let emailMap = {};
            if (process.env.NOTIFY_EMAIL_MAP) {
              try {
                emailMap = JSON.parse(process.env.NOTIFY_EMAIL_MAP);
              } catch (error) {
                core.warning(`Ignoring invalid SMTP_NOTIFY_EMAIL_MAP JSON: ${error.message}`);
              }
            }

            const { data: commit } = await github.rest.repos.getCommit({
              ...context.repo,
              ref: process.env.GIT_SHA,
            });

            const candidates = [
              context.payload.pull_request?.user?.login,
              context.payload.release?.author?.login,
              commit.author?.login,
              commit.committer?.login,
              context.actor,
            ].filter(Boolean);
            const login = [...new Set(candidates)][0];

            if (login && emailMap[login]) {
              core.setOutput('email', emailMap[login]);
              return;
            }

            if (login) {
              const { data: user } = await github.rest.users.getByUsername({ username: login });
              if (usableEmail(user.email)) {
                core.setOutput('email', user.email);
                return;
              }
            }

            const commitEmails = [
              commit.commit.author?.email,
              commit.commit.committer?.email,
            ];
            const commitEmail = commitEmails.find(usableEmail);
            if (commitEmail) {
              core.setOutput('email', commitEmail);
              return;
            }

            core.warning(
              `Could not resolve a public notification email for ${login || 'the commit author'}; deployment email notification will be skipped.`
            );
            core.setOutput('email', '');

  create-checks:

    needs:
      - build-image
      - resolve-variables

    outputs:
      build-check-run-id: ${{ steps.deploy-checks.outputs.build-check-run-id }}
      upload-model-check-run-id: ${{ steps.deploy-checks.outputs.upload-model-check-run-id }}
      upload-artifact-check-run-id: ${{ steps.deploy-checks.outputs.upload-artifact-check-run-id }}
      cleanup-check-run-id: ${{ steps.deploy-checks.outputs.cleanup-check-run-id }}

    runs-on: ubuntu-latest

    steps:

      - name: Create GitHub App token for deploy checks
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Create deploy checks
        id: deploy-checks
        uses: actions/github-script@v9
        env:
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MODEL_MODE: ${{ needs.resolve-variables.outputs.model_mode }}
          EVENT_NAME: ${{ github.event_name }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
              const checks = [
                ['build-check-run-id', 'Build', 'Build is queued.'],
                ['cleanup-check-run-id', 'CD Cleanup', 'CD cleanup is queued.'],
              ];
              if (['release', 'post'].includes(process.env.MODEL_MODE)) {
                checks.push(['upload-model-check-run-id', 'Upload model', 'Model upload is queued.']);
              }
              if (process.env.EVENT_NAME === 'release') {
                checks.push(['upload-artifact-check-run-id', 'Upload release artifact', 'Release artifact upload is queued.']);
              }

              for (const [outputName, checkName, summary] of checks) {
                const response = await github.rest.checks.create({
                  ...context.repo,
                  name: checkName,
                  head_sha: process.env.GIT_SHA,
                  status: 'in_progress',
                  started_at: new Date().toISOString(),
                  details_url: process.env.GITHUB_RUN_URL,
                  output: {
                    title: checkName,
                    summary,
                  },
                });

                core.setOutput(outputName, String(response.data.id));
              }

  deploy-fallback:

    needs:
      - build-image
      - create-checks

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create GitHub App token for cd-cleanup dispatch
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: write

      - name: Dispatch cd-cleanup workflow
        shell: bash
        env:
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DISPATCH_REF: ${{ github.head_ref || github.ref_name }}
          BUILD_CHECK_RUN_ID: ${{ needs.create-checks.outputs.build-check-run-id }}
          UPLOAD_MODEL_CHECK_RUN_ID: ${{ needs.create-checks.outputs.upload-model-check-run-id }}
          UPLOAD_ARTIFACT_CHECK_RUN_ID: ${{ needs.create-checks.outputs.upload-artifact-check-run-id }}
          CLEANUP_CHECK_RUN_ID: ${{ needs.create-checks.outputs.cleanup-check-run-id }}
          IMAGE_TAG: ${{ needs.build-image.outputs.tag }}
          BUILD_CONCLUSION: failure
          UPLOAD_MODEL_CONCLUSION: failure
          UPLOAD_ARTIFACT_CONCLUSION: failure
        run: |
          sh .github/scripts/deploy-dispatch.sh

